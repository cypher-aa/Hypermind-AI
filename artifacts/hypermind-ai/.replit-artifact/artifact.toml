kind = "web"
previewPath = "/"
title = "HyperMind AI"
version = "1.0.0"
id = "artifacts/hypermind-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21727

[services.development]
run = "pnpm --filter @workspace/hypermind-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hypermind-ai", "run", "build" ]
publicDir = "artifacts/hypermind-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21727"
BASE_PATH = "/"
